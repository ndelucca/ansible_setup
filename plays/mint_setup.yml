---
- name: Linux mint setup
  hosts: my_machines
  become: true

  tasks:
    - name: Importing mint_setup git.yml tasks
      ansible.builtin.import_role:
        name: mint_setup
      vars:
        mint_setup_user: "{{ host_user.name }}"
        mint_setup_group: "{{ host_user.group }}"
        mint_setup_user_email: "{{ host_user.email }}"
        mint_setup_user_passwd: "{{ host_user.passwd }}"
